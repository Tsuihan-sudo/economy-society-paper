<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>城市中心生产活动：六维机制参数</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667085;
      --line: #d0d5dd;
      --panel: #f8fafc;
      --blue: #2a6f97;
      --red: #9e2a2b;
      --green: #2a9d8f;
      --amber: #e09f3e;
      --purple: #6d597a;
      --slate: #475467;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: white;
      line-height: 1.55;
    }
    header {
      padding: 28px 28px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    header p { margin: 0; color: var(--muted); max-width: 980px; }
    main {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 24px;
      padding: 24px 28px 32px;
    }
    aside {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      align-self: start;
      background: #fff;
    }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }
    button:hover { background: var(--panel); }
    .links {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      font-size: 14px;
    }
    .links a { display: block; margin: 5px 0; color: #175cd3; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .chart-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 640px;
    }
    #chart {
      width: 100%;
      height: min(78vh, 760px);
      min-height: 560px;
      display: block;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 12px;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--slate);
    }
    .swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    table {
      margin-top: 16px;
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 7px 6px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      header { padding: 22px 16px 14px; }
      #chart { height: 560px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>城市中心生产活动：六维机制参数雷达图</h1>
    <p>该页面展示论文中用于阈值模型的行业先验参数。左三维为吸引作用：集聚、知识、速度；右三维为排斥作用：占地、污染/监管、物流。参数为 0-1 归一化指数，用于机制比较，不是真实估计。</p>
  </header>

  <main>
    <aside>
      <h2>选择行业</h2>
      <div class="button-row">
        <button id="selectDefaults">默认</button>
        <button id="selectAll">全选</button>
        <button id="clearAll">清空</button>
      </div>
      <div id="controls" class="controls"></div>
      <div class="links">
        <strong>交互页面</strong>
        <a href="map.html">POI 交互地图</a>
        <br>
        <strong>数据文件</strong>
        <a href="data/model_parameters.csv">行业参数 CSV</a>
        <a href="data/scenario_parameters.csv">情景参数 CSV</a>
        <a href="data/amap_poi_raw.csv">原始 POI 数据 CSV</a>
        <a href="data/poi_classification_audit.csv">分类审计表 CSV</a>
        <a href="data/poi_spatial.csv">空间变量数据 CSV</a>
      </div>
    </aside>

    <section class="chart-wrap">
      <svg id="chart" viewBox="0 0 900 700" role="img" aria-label="行业六维参数雷达图"></svg>
      <div id="legend" class="legend"></div>
      <table id="values">
        <thead>
          <tr>
            <th>行业</th><th>集聚</th><th>知识</th><th>速度</th><th>占地</th><th>污染/监管</th><th>物流</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script>
    const axes = [
      ["agglomeration", "集聚"],
      ["knowledge", "知识"],
      ["speed", "速度"],
      ["land_intensity", "占地"],
      ["pollution", "污染/监管"],
      ["logistics", "物流"],
    ];
    const defaultIndustries = new Set([
      "traditional_heavy_factory",
      "fashion_sample_making",
      "rd_prototyping_lab",
      "digital_content_production",
      "urban_micro_factory",
    ]);
    const colors = ["#9e2a2b", "#2a6f97", "#2a9d8f", "#e09f3e", "#6d597a", "#475467", "#bc6c25", "#0077b6", "#588157"];

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines.shift().split(",");
      return lines.map(line => {
        const values = line.split(",");
        const row = {};
        headers.forEach((h, i) => row[h] = values[i]);
        axes.forEach(([key]) => row[key] = Number(row[key]));
        return row;
      });
    }

    function polar(cx, cy, radius, angle) {
      return [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];
    }

    function pointsFor(row, cx, cy, maxR) {
      return axes.map((axis, i) => {
        const angle = -Math.PI / 2 + i * 2 * Math.PI / axes.length;
        const r = maxR * row[axis[0]];
        return polar(cx, cy, r, angle).join(",");
      }).join(" ");
    }

    function draw(data) {
      const selected = new Set([...document.querySelectorAll("input[data-industry]:checked")].map(el => el.dataset.industry));
      const shown = data.filter(row => selected.has(row.industry));
      const svg = document.getElementById("chart");
      const legend = document.getElementById("legend");
      const tbody = document.querySelector("#values tbody");
      svg.innerHTML = "";
      legend.innerHTML = "";
      tbody.innerHTML = "";

      const cx = 450, cy = 330, maxR = 240;
      const ns = "http://www.w3.org/2000/svg";
      function el(name, attrs = {}) {
        const node = document.createElementNS(ns, name);
        Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
        svg.appendChild(node);
        return node;
      }
      function text(x, y, content, attrs = {}) {
        const node = el("text", {x, y, ...attrs});
        node.textContent = content;
        return node;
      }

      for (let level = 1; level <= 5; level++) {
        const r = maxR * level / 5;
        const pts = axes.map((_, i) => polar(cx, cy, r, -Math.PI / 2 + i * 2 * Math.PI / axes.length).join(",")).join(" ");
        el("polygon", {points: pts, fill: "none", stroke: "#d0d5dd", "stroke-width": 1});
        text(cx + 6, cy - r + 4, (level / 5).toFixed(1), {"font-size": 11, fill: "#667085"});
      }

      axes.forEach(([, label], i) => {
        const angle = -Math.PI / 2 + i * 2 * Math.PI / axes.length;
        const [x1, y1] = polar(cx, cy, maxR, angle);
        const [x2, y2] = polar(cx, cy, maxR + 34, angle);
        el("line", {x1: cx, y1: cy, x2: x1, y2: y1, stroke: "#98a2b3", "stroke-width": 1});
        text(x2, y2, label, {
          "text-anchor": x2 < cx - 5 ? "end" : x2 > cx + 5 ? "start" : "middle",
          "dominant-baseline": "middle",
          "font-size": 15,
          fill: "#1f2933",
          "font-weight": 600
        });
      });

      shown.forEach((row, idx) => {
        const color = colors[idx % colors.length];
        el("polygon", {
          points: pointsFor(row, cx, cy, maxR),
          fill: color,
          "fill-opacity": 0.12,
          stroke: color,
          "stroke-width": 2.2
        });
        axes.forEach(([key], i) => {
          const angle = -Math.PI / 2 + i * 2 * Math.PI / axes.length;
          const [x, y] = polar(cx, cy, maxR * row[key], angle);
          el("circle", {cx: x, cy: y, r: 3.5, fill: color});
        });
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `<span class="swatch" style="background:${color}"></span>${row.label_zh}`;
        legend.appendChild(item);

        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${row.label_zh}</td>` + axes.map(([key]) => `<td>${row[key].toFixed(2)}</td>`).join("");
        tbody.appendChild(tr);
      });

      if (!shown.length) {
        text(cx, cy, "请选择至少一个行业", {"text-anchor": "middle", "font-size": 18, fill: "#667085"});
      }
    }

    async function init() {
      const res = await fetch("data/model_parameters.csv");
      const data = parseCsv(await res.text());
      const controls = document.getElementById("controls");
      data.forEach(row => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" data-industry="${row.industry}" ${defaultIndustries.has(row.industry) ? "checked" : ""}>${row.label_zh}`;
        controls.appendChild(label);
      });
      controls.addEventListener("change", () => draw(data));
      document.getElementById("selectDefaults").addEventListener("click", () => {
        document.querySelectorAll("input[data-industry]").forEach(el => el.checked = defaultIndustries.has(el.dataset.industry));
        draw(data);
      });
      document.getElementById("selectAll").addEventListener("click", () => {
        document.querySelectorAll("input[data-industry]").forEach(el => el.checked = true);
        draw(data);
      });
      document.getElementById("clearAll").addEventListener("click", () => {
        document.querySelectorAll("input[data-industry]").forEach(el => el.checked = false);
        draw(data);
      });
      draw(data);
    }

    init().catch(err => {
      document.getElementById("chart").outerHTML = `<p>数据加载失败：${err.message}</p>`;
    });
  </script>
</body>
</html>
